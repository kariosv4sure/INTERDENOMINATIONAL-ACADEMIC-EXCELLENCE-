{% extends "base.html" %}

{% block title %}Admin Login | I.A.E™{% endblock %}

{% block extra_css %}
<style>
    .admin-login-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 0;
        background: linear-gradient(135deg, #0B2B40 0%, #1E5A6F 100%);
    }
    
    .admin-login-container {
        max-width: 450px;
        width: 100%;
        margin: 0 auto;
        background: var(--white);
        border-radius: 32px;
        box-shadow: var(--shadow-lg);
        padding: 2.5rem;
        position: relative;
        overflow: hidden;
    }
    
    .admin-login-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, var(--accent-gold), var(--primary-light));
    }
    
    .admin-badge {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .admin-badge i {
        font-size: 3rem;
        color: var(--accent-gold);
        background: var(--primary-dark);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
    }
    
    .admin-badge h2 {
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
    }
    
    .admin-badge p {
        color: var(--gray-600);
        font-size: 0.9rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--dark);
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--gray-200);
        border-radius: 16px;
        font-family: inherit;
        font-size: 1rem;
        transition: var(--transition);
    }
    
    .form-group input:focus {
        outline: none;
        border-color: var(--accent-gold);
    }
    
    .admin-login-btn {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        margin-top: 0.5rem;
    }
    
    .admin-login-btn:hover {
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--gray-200);
    }
    
    .back-link a {
        color: var(--gray-600);
        text-decoration: none;
        font-size: 0.9rem;
    }
    
    .back-link a:hover {
        color: var(--primary);
    }
    
    @media (max-width: 480px) {
        .admin-login-container {
            padding: 1.5rem;
            margin: 0 1rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="admin-login-section">
    <div class="container">
        <div class="admin-login-container" data-aos="fade-up">
            <div class="admin-badge">
                <i class="fas fa-shield-alt"></i>
                <h2>Admin Access</h2>
                <p>Enter your credentials to access the admin dashboard</p>
            </div>
            
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary admin-login-btn">
                    <i class="fas fa-lock-open"></i> Access Dashboard
                </button>
            </form>
            
            <div class="back-link">
                <a href="{{ url_for('index') }}">
                    <i class="fas fa-arrow-left"></i> Back to Homepage
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
