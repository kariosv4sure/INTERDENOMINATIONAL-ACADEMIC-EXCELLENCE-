{% extends "base.html" %}

{% block title %}Login | I.A.E™{% endblock %}

{% block extra_css %}
<style>
    .auth-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 0;
        background: linear-gradient(135deg, var(--light-bg) 0%, var(--white) 100%);
    }
    
    .auth-container {
        max-width: 450px;
        width: 100%;
        margin: 0 auto;
        background: var(--white);
        border-radius: 32px;
        box-shadow: var(--shadow-lg);
        padding: 2.5rem;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-header h2 {
        color: var(--primary);
        margin-bottom: 0.5rem;
    }
    
    .auth-header p {
        color: var(--gray-600);
        font-size: 0.9rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--dark);
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--gray-200);
        border-radius: 16px;
        font-family: inherit;
        font-size: 1rem;
        transition: var(--transition);
    }
    
    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
    }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        margin-top: 0.5rem;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--gray-200);
    }
    
    .auth-footer p {
        color: var(--gray-600);
        font-size: 0.9rem;
    }
    
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    @media (max-width: 480px) {
        .auth-container {
            padding: 1.5rem;
            margin: 0 1rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-container" data-aos="fade-up">
            <div class="auth-header">
                <i class="fas fa-graduation-cap" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2>Welcome Back!</h2>
                <p>Login to access your dashboard and AI assistant</p>
            </div>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
